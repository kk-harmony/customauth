name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: customoauth
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      CUSTOMOAUTH_TEST_CONNECTION: Host=localhost;Port=5432;Database=customoauth;Username=postgres;Password=postgres

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore CustomOAuthServer.sln

      - name: Build
        run: dotnet build CustomOAuthServer.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test CustomOAuthServer.sln --configuration Release --no-build --verbosity normal
