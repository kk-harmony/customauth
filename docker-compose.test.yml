# PostgreSQL for local integration tests and CI-like runs.
# Usage:
#   docker compose -f docker-compose.test.yml up -d --wait
#   export CUSTOMOAUTH_TEST_CONNECTION="Host=localhost;Port=5432;Database=customoauth;Username=postgres;Password=postgres"
#   dotnet test CustomOAuthServer.sln -c Release
# Or: ./scripts/run-tests.sh

services:
  postgres:
    image: postgres:16-alpine
    container_name: customoauth-postgres-test
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: customoauth
    ports:
      - "5432:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d customoauth"]
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 5s
